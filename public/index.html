<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjeeth's Task Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="logo">
                <i class="fas fa-layer-group"></i>
                <h1>Task<span>Tracker</span></h1>
            </div>
            <p class="subtitle">Synced with Excel</p>
        </header>

        <section class="input-section">
            <form id="todo-form">
                <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">
                <input type="date" id="end-at-input" title="End date (optional)">
                <button type="submit" id="add-btn">
                    <i class="fas fa-plus"></i>
                    <span>Add Task</span>
                </button>
            </form>
        </section>

        <section class="tabs-section">
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="active">
                    <i class="fas fa-circle-check"></i> Active
                </button>
                <button class="tab-btn" data-tab="completed">
                    <i class="fas fa-circle-check"></i> Completed
                </button>
            </div>
            <div class="tab-content">
                <div id="active-panel" class="tab-panel active">
                    <div class="list-header">
                        <h2>Active Tasks <span id="active-count">0</span></h2>
                    </div>
                    <ul id="active-list" class="task-list"></ul>
                </div>
                <div id="completed-panel" class="tab-panel">
                    <div class="list-header">
                        <h2>Completed Tasks <span id="completed-count">0</span></h2>
                    </div>
                    <ul id="completed-list" class="task-list"></ul>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Task Tracker by Sanjeeth. Maintaining data in <code>tasks.xlsx</code></p>
    </footer>

    <div id="duplicate-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Similar Task Exists</h3>
            </div>
            <div class="modal-body">
                <p>A similar task already exists:</p>
                <p class="modal-task-text" id="modal-task-text"></p>
                <div class="modal-details">
                    <span><i class="fas fa-clock"></i> Last done: <strong id="modal-last-done"></strong></span>
                    <span><i class="fas fa-info-circle"></i> Status: <strong id="modal-status"></strong></span>
                </div>
                <p class="modal-question">Do you want to create it again?</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="modal-cancel">Cancel</button>
                <button class="modal-btn create-btn" id="modal-create-anyway">Create Anyway</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
